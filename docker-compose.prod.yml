# Production Docker Compose - Com Nginx reverse proxy
# Usage: docker-compose -f docker-compose.prod.yml up -d

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: start-app
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-startpro}:${POSTGRES_PASSWORD:-startpro}@postgres:5432/${POSTGRES_DB:-startpro}
      - JWT_SECRET=${JWT_SECRET}
      - SETUP_SECRET=${SETUP_SECRET}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - start-network
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs

  postgres:
    image: postgres:16-alpine
    container_name: start-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-startpro}
      POSTGRES_USER: ${POSTGRES_USER:-startpro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-startpro}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations:/migrations:ro,Z
      - ./database/migrate.sh:/migrate.sh:ro,Z
      - ./database/postgres-startup.sh:/postgres-startup.sh:ro,Z
    entrypoint: ["sh", "/postgres-startup.sh"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-startpro} -d ${POSTGRES_DB:-startpro}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - start-network
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"

  nginx:
    image: nginx:alpine
    container_name: start-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - start-network

networks:
  start-network:
    driver: bridge

volumes:
  pgdata:
