services:
  postgres:
    image: postgres:16-alpine
    container_name: startpro-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: startpro
      POSTGRES_USER: startpro
      POSTGRES_PASSWORD: startpro123
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations:/migrations:ro,Z
      - ./database/migrate.sh:/migrate.sh:ro,Z
      - ./database/postgres-startup.sh:/postgres-startup.sh:ro,Z
    entrypoint: ["sh", "/postgres-startup.sh"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U startpro -d startpro"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
