services:
  postgres:
    image: postgres:16-alpine
    container_name: startpro-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: startpro
      POSTGRES_USER: startpro
      POSTGRES_PASSWORD: startpro123
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U startpro -d startpro"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
