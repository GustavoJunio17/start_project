services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: start-app
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-startpro}:${POSTGRES_PASSWORD:-startpro}@postgres:5432/${POSTGRES_DB:-startpro}
      - JWT_SECRET=${JWT_SECRET}
      - SETUP_SECRET=${SETUP_SECRET}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - start-network
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs

  postgres:
    image: postgres:16-alpine
    container_name: start-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-startpro}
      POSTGRES_USER: ${POSTGRES_USER:-startpro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-startpro}
    volumes:
      - pgdata:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - max_connections=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-startpro} -d ${POSTGRES_DB:-startpro}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - start-network

networks:
  start-network:
    driver: bridge

volumes:
  pgdata:
